services:
  - type: web
    name: udainthorai-uruvakkuvom-charitable-trust-static
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    previews:
      generation: automatic
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
